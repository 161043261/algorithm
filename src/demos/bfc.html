<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .parent {
      background: #00ff00;
      opacity: 50%;
      /* 父元素有两个浮动子元素, 高度为 0 (父元素高度塌陷) */
      /* 开启 14 行, 让父元素成为 bfc, 避免父元素高度塌陷 */
      display: inline-block;
      width: 100vw;
    }

    .float-left {
      float: left;
      width: 200px;
      height: 200px;
      background: #ff0000;
    }

    .float-right {
      float: right;
      width: 200px;
      height: 200px;
      background: #0000ff;
    }
  </style>

  <body>
    <div class="parent">
      <div class="float-left"></div>
      <div class="float-right"></div>
    </div>
  </body>
</html>
