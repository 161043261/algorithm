<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .display-none {
        display: none;
      }
      .visibility-hidden {
        visibility: hidden;
      }
      .opacity-0 {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <!-- display-none visibility-hidden opacity-0 -->
    <div class="h-30 w-30 bg-green-300 zone"></div>
    <div style="display: flex; flex-direction: column">
      <button class="btn">Test Display None</button>
      <button class="btn2">Test Visibility Hidden</button>
      <button class="btn3">Test Opacity 0</button>
    </div>
  </body>
  <script>
    const btn = document.querySelector(".btn");
    const btn2 = document.querySelector(".btn2");
    const btn3 = document.querySelector(".btn3");
    const zone = document.querySelector(".zone");
    // btn.addEventListener("click", () => {
    //   zone.classList.toggle("display-none");
    // });

    btn2.addEventListener("click", () => {
      zone.classList.toggle("visibility-hidden");
    });

    // btn3.addEventListener("click", () => {
    //   zone.classList.toggle("opacity-0");
    // });
  </script>
</html>
